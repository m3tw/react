name: Compatibility Matrix

on:
  workflow_call:
  pull_request:
    paths:
      - ".github/workflows/compatibility-matrix.yml"
      - "README.md"
      - "react-md3/**"
  push:
    paths:
      - ".github/workflows/compatibility-matrix.yml"
      - "README.md"
      - "react-md3/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility-matrix:
    name: Node ${{ matrix.node-version }} / ${{ matrix.package-manager }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # Node 20 is intentionally present so unsupported combinations stay explicit in policy.
        node-version: ["20", "22", "24"]
        package-manager: ["npm", "pnpm", "yarn", "bun"]
        exclude:
          # Support window starts at Node 22; all Node-20 cells are excluded by design.
          - node-version: "20"
            package-manager: "npm"
          - node-version: "20"
            package-manager: "pnpm"
          - node-version: "20"
            package-manager: "yarn"
          - node-version: "20"
            package-manager: "bun"

    defaults:
      run:
        working-directory: react-md3

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js (npm cache)
        if: matrix.package-manager == 'npm'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: react-md3/package-lock.json

      - name: Set up Node.js (pnpm/yarn)
        if: matrix.package-manager == 'pnpm' || matrix.package-manager == 'yarn'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Set up Node.js (bun without cache)
        if: matrix.package-manager == 'bun'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Activate package manager toolchain
        run: |
          case "${{ matrix.package-manager }}" in
            npm)
              npm --version
              ;;
            pnpm)
              corepack enable
              corepack prepare pnpm@10.28.2 --activate
              pnpm --version
              ;;
            yarn)
              corepack enable
              corepack prepare yarn@4.6.0 --activate
              yarn --version
              ;;
            bun)
              echo "bun setup handled in dedicated step"
              ;;
            *)
              echo "Unsupported package manager: ${{ matrix.package-manager }}" >&2
              exit 1
              ;;
          esac

      - name: Set up Bun
        if: matrix.package-manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: |
          case "${{ matrix.package-manager }}" in
            npm)
              npm ci
              ;;
            pnpm)
              pnpm install --frozen-lockfile=false
              ;;
            yarn)
              yarn install --mode=skip-build --no-immutable
              ;;
            bun)
              bun install
              ;;
            *)
              echo "Unsupported package manager: ${{ matrix.package-manager }}" >&2
              exit 1
              ;;
          esac

      - name: Run quality gate
        run: |
          case "${{ matrix.package-manager }}" in
            npm)
              npm run quality:gate
              ;;
            pnpm)
              pnpm run quality:gate
              ;;
            yarn)
              yarn run quality:gate
              ;;
            bun)
              bun run quality:gate
              ;;
            *)
              echo "Unsupported package manager: ${{ matrix.package-manager }}" >&2
              exit 1
              ;;
          esac

      - name: Publish support policy summary
        if: matrix.node-version == '22' && matrix.package-manager == 'npm'
        run: |
          {
            echo "## Support policy"
            echo ""
            echo "Supported CI matrix:"
            echo "- Node 22 + npm/pnpm/yarn/bun"
            echo "- Node 24 + npm/pnpm/yarn/bun"
            echo ""
            echo "Explicitly unsupported combinations:"
            echo "- Node 20 + npm/pnpm/yarn/bun (excluded by matrix policy)"
            echo ""
            echo "If a supported cell fails, classify as setup/toolchain/API regression."
          } >> "$GITHUB_STEP_SUMMARY"
